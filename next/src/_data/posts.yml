      pt: Temporadas
      en: Seasons
      es: Temporadas
    title:
      ru: "Сезон дождей в Бразилии: что меняется в плане трансфера"
      pt: "Temporada de chuvas no Brasil: o que muda no plano do transfer"
      en: "Rainy season in Brazil: what changes in the transfer plan"
      es: "Temporada de lluvias en Brasil: qué cambia en el plan del transfer"
    excerpt:
      ru: "Январь–март на побережье: дороги, fog, скорость подачи. Запас по времени и сценарии резерва."
      pt: "Janeiro a março no litoral: estradas, neblina, tempo de chegada. Reservas de tempo e cenários de contingência."
      en: "January to March on the coast: roads, fog, pickup timing. Time buffers and fallback scenarios."
      es: "Enero a marzo en el litoral: rutas, niebla, tiempo de llegada. Márgenes de tiempo y planes de contingencia."
    intro:
      ru: "Бразильский сезон дождей — это не «весь день ливень». Это короткие, но интенсивные грозы, fog на серра-роадах и почти гарантированная задержка в одном из аэропортов региона за неделю. Что мы добавляем в стандартный план поездки в эти месяцы — ниже."
      pt: "A temporada de chuvas no Brasil não é 'chove o dia todo'. São tempestades curtas e intensas, neblina nas serras e quase sempre uma operação aérea atrasada nos aeroportos do litoral durante a semana. O que adicionamos ao plano padrão nesses meses está abaixo."
      en: "Brazil's rainy season is not 'all-day rain.' It's short, intense storms, fog on mountain roads, and an almost guaranteed delay at one of the region's airports each week. Here's what we add to the standard trip plan during these months."
      es: "La temporada de lluvias en Brasil no es 'llueve todo el día'. Son tormentas cortas e intensas, niebla en rutas serranas y casi siempre algún retraso aéreo en los aeropuertos del litoral. Lo que añadimos al plan estándar en estos meses, abajo."
