    eyebrow: "Serviço por hora"
    title: "Motorista para o dia ou por hora"
    lead: "Quando a viagem não é 'ponto A → ponto B', mas várias reuniões, paradas e esperas em sequência. O carro e o motorista ficam à sua disposição pelo período acordado."
    p2Title: "2 horas"
    p2Body: "Pacote mínimo. Recepção, uma ou duas paradas, retorno. Bom para saídas curtas dentro da cidade."
    p4Title: "4 horas · meio dia"
    p4Body: "Bloco de manhã ou tarde. Várias reuniões na cidade, compras, esperas nos pontos."
    p8Title: "8 horas · dia inteiro"
    p8Body: "Dia completo em uma ou duas cidades. Cronograma de reuniões, pausa para almoço, retorno ao fim do dia."
    p12Title: "12 horas · executivo"
    p12Body: "Dia de trabalho longo com deslocamento entre cidades. Inclui tempo de estrada, esperas, retorno tarde."
    includesTitle: "O que está incluído"
    inc1: "Motorista, combustível, estacionamento e pedágios na rota"
    inc2: "Água, USB, climatização, silêncio na cabine sob pedido"
    inc3: "Esperas nos pontos conforme cronograma, sem taxímetro"
    inc4: "Mudança de rota durante o dia — operação padrão"
    notIncludesTitle: "O que conta à parte"
    notInc1: "Horas além do pacote — extensão na mesma tarifa"
    notInc2: "Intermunicipal acima de 100 km por trecho — recalculo pela tarifa de trecho longo"
    notInc3: "Segmentos de escolta com outro carro — solicitação separada"
    cta: "Reservar serviço por hora"
  eventsPage:
    eyebrow: "Grupos e eventos"
    title: "Logística para delegações, eventos e grupos"
    lead: "Da delegação com transfers programados à logística completa de transporte de um casamento ou conferência. Não 'vários táxis ao mesmo tempo', mas operação única com despachante."
    g1Title: "Conferências e cúpulas"
    g1Body: "Programa de transfer para participantes: aeroporto → hotel → local → hotel. Controle por lista. Reserva para atrasos."
    g2Title: "Casamentos e celebrações"
    g2Body: "Logística do dia do casamento: convidados desde o hotel, carro do casal, retorno após a festa. Carros sem marcas ou com decoração temática."
    g3Title: "Grupos corporativos"
    g3Body: "Outings, team buildings, deslocamentos em grupo de 8 a 30+ pessoas. Van ou micro-ônibus, às vezes vários veículos."
    g4Title: "Delegações e road-show"
    g4Body: "3–5 dias, várias cidades, até 10 pontos de reunião por dia. Coordenador dedicado, relatório diário de km e tempo."
    formatTitle: "Como trabalhamos com grupos"
    f1Title: "Briefing 7+ dias antes"
    f1Body: "Quanto antes, melhor a reserva. Mínimo — 48h para configurações até 14 pessoas, 7 dias para 15+."
    f2Title: "Um único coordenador"
    f2Body: "Comunicação por um canal. Não motorista/despachante/gerente em sequência — ponto único de decisão."
    f3Title: "Contrato e NF-e"
    f3Body: "Contrato padrão, NF-e no CNPJ do organizador, relatório por segmentos."
    f4Title: "Veículo reserva"
    f4Body: "Em eventos > 20 pessoas — reserva é padrão. Para delegações, sob acordo."
    cta: "Conversar sobre o programa"
  guaranteesPage:
    eyebrow: "Service guarantees"
    title: "O que garantimos por escrito"
    lead: "Não 'geralmente dá certo'. Compromissos concretos que cobrem cada solicitação. Se descumprirmos, compensação conforme descrito abaixo."
    g1Title: "Confirmação do pedido"
    g1Body: "Em até 15 minutos após receber o briefing em horário comercial (09:00–22:00 BRT). Janela noturna — até 30 minutos."
    g1Penalty: "Resposta atrasada — 5 % de desconto na viagem."
    g2Title: "Horário de retirada"
    g2Body: "Motorista no local até o horário acordado. Atraso conta a partir de 5 minutos após o ETA."
    g2Penalty: "Por nossa falha — cada hora completa de atraso = 25 % de compensação (até 100 %)."
    g3Title: "Espera no aeroporto"
    g3Body: "60 minutos após o pouso já incluídos, independente do atraso do voo. Após — pela tarifa de espera acordada."
    g3Penalty: "Se o motorista sair antes do fim da espera — nova retirada por nossa conta."
    g4Title: "Documentos e NF-e"
    g4Body: "NF-e emitida no CNPJ do cliente em até 5 dias úteis após a viagem."
    g4Penalty: "Em caso de atraso — emissão acelerada e compensação de tarifa bancária se necessário."
    g5Title: "Cancelamento de reserva"
    g5Body: "Cancelamento por nossa parte (pane, doença do motorista sem substituto) — reembolso integral + 20 % de desconto na próxima viagem."
    g5Penalty: ""
    g6Title: "Confidencialidade"
    g6Body: "Sem repasse de rota/nome a terceiros. NDA sob pedido. Dados criptografados."
    g6Penalty: "Quebra por parte da equipe = rescisão do contrato e indenização."
    cta: "Receber condições completas"
  driversPage:
    eyebrow: "Carreira na Morrison"
    title: "Ser motorista Morrison"
    lead: "Adicionamos motoristas para regiões e combinações de idiomas específicas. Se você atende — envie sua candidatura."
    requirementsTitle: "Requisitos"
    req1: "CNH categoria D ou CNH B com EAR (Exercício de Atividade Remunerada)"
    req2: "Mínimo 5 anos de experiência com passageiros"
    req3: "Ausência de antecedentes criminais — certidão Antecedentes Criminais"
    req4: "Inglês conversacional (B1+) ou espanhol. Opcional: russo, italiano, alemão"
    req5: "Carro próprio ou alugado de categoria premium (Toyota Altis, SW4, Sprinter e similares)"
    req6: "Disponibilidade para trechos longos e travessias internacionais"
    offerTitle: "O que oferecemos"
    off1: "Fluxo estável de pedidos premium, sem turnos de 12 horas no taxímetro"
    off2: "Tarifas transparentes por tabela, sem disputa com agregadores"
    off3: "Formalização jurídica, NF-e no seu CNPJ ou MEI"
    off4: "Treinamentos de confidencialidade, segurança e atendimento VIP"
    off5: "Grupo fechado de motoristas da rede — troca de experiências, casos, contatos"
