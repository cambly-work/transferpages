    b1Title: "Transfers ejecutivos de aeropuerto"
    b1Body: "Recepción en FBO/sala VIP o en la salida del terminal con tracking de vuelo, cabina silenciosa y vehículo sin logos."
    b2Title: "Movilidad de inversores y delegaciones"
    b2Body: "Programas multi-día y multi-ciudad con un solo coordinador. Confidencialidad bajo NDA."
    b3Title: "Rutas corporativas recurrentes"
    b3Body: "Tramos mensuales con tarifa fija y NF-e mensual al CNPJ corporativo."
    b4Title: "Viaje confidencial"
    b4Body: "Sin marca en el vehículo, sin nombres en canales abiertos, datos por canal seguro. NDA a pedido."
    b5Title: "Coordinación con hotel y residencia"
    b5Body: "Alineado con conserje, hora de check-in/out, estacionamiento y punto de retiro. El huésped sale — el coche ya está."
    b6Title: "Transporte de eventos"
