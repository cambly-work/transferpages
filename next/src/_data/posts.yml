    excerpt:
      ru: "Как уложить водопады с обеих сторон, парк птиц и кайандо в полтора дня — без потерянного времени в кассах."
      pt: "Como encaixar as cataratas dos dois lados, parque das aves e cassino em um dia e meio — sem perder tempo em bilheteria."
      en: "How to fit both sides of the falls, the bird park and the casino into a day and a half — no time lost at ticket windows."
