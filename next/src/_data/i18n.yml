  teamPage:
    eyebrow: Equipe
    title: Pessoas que ficam ao volante.
    lead: Numa viagem longa, você passa 8 horas com uma pessoa. Quem é — contamos antes, não "envio a foto no momento".
    note: Todos os motoristas têm contrato formal, CNH categoria D ou B + EAR válida, comprovada experiência com passageiros e domínio de inglês ou espanhol na medida exigida pela rota.
    placeholder: A seção está sendo montada. Cards reais aparecem após o aceite por escrito dos motoristas — não publicamos fotos e nomes sem autorização.
  aboutPage:
    eyebrow: Sobre nós
    title: Resultado calmo, organizado, previsível.
    lead: Morrison Premium Transfer — transfers privados pelo Brasil e países do Mercosul com preço fixado e condições acordadas antes da partida.
    valuesTitle: Como nos diferenciamos de táxi e ride-sharing
    val1Title: Preço fechado antes da partida
    val1Body: Nada de "o taxímetro marcou mais" e cobranças no meio do caminho. Valor e condições — em confirmação escrita.
    val2Title: Responsabilidade jurídica
    val2Body: Pessoa jurídica no Brasil, seguro de passageiros, NF-e para empresas.
    val3Title: Suporte multilíngue
    val3Body: Atendimento em russo, português e inglês. Sem "Google Translate no WhatsApp".
    val4Title: Cenário preparado
    val4Body: Rota, paradas, documentos para travessia de fronteira — montados antes, não na estrada.
    credentialsEyebrow: Documentos e seguros
    credentialsTitle: No papel, não só na conversa
    credentialsLead: Premium é, antes de tudo, conformidade jurídica. Abaixo, os documentos que apresentamos a pedido antes do contrato.
    credAnttTitle: ANTT · transporte de passageiros
    credAnttBody: Registro na Agência Nacional de Transportes Terrestres para viagens interestaduais. Sem ele não é "transfer", é carona.
    credAblaTitle: ABLA · associação setorial
    credAblaBody: Associados à Associação Brasileira de Locadoras de Automóveis — padrões de serviço, troca de experiências sobre incidentes, acesso a condições coletivas de seguradoras.
    credDpvatTitle: DPVAT + seguro corporativo
    credDpvatBody: Seguro obrigatório (DPVAT) e apólice corporativa com responsabilidade estendida sobre passageiros até R$ 200.000 por vida.
    credLgpdTitle: LGPD · proteção de dados
    credLgpdBody: Pedidos, telefone, nome do passageiro — guardados de acordo com a Lei Geral de Proteção de Dados. Apagamos ou exportamos sob pedido em até 5 dias úteis.
    credNfeTitle: NF-e · nota fiscal eletrônica
    credNfeBody: Cada viagem com NF-e correta no CNPJ do cliente. Serve para reembolso pela contabilidade de empresa estrangeira ou representação.
    credCheckTitle: Checagem do motorista
    credCheckBody: Antecedentes Criminais + CNH com EAR + mínimo de 5 anos de experiência com passageiros. Verificável via certidão.
    howWeWorkEyebrow: Como trabalhamos
    howWeWorkTitle: Processo — do pedido ao relatório
    howWeWorkStep1: '"Briefing" — 24 horas antes da viagem fixamos rota, horários, documentos, alergias e preferências.'
    howWeWorkStep2: '"Verificação" — 6 horas antes: meteorologia, obras na pista, previsão de trânsito, situação da fronteira. Se algo muda, avisamos na hora.'
    howWeWorkStep3: '"Viagem" — motorista recebe com placa de nome, carro vistoriado um dia antes. Contato com central a cada 30 min em trecho longo.'
    howWeWorkStep4: '"Relatório" — fotos da rota, registro de tempo, NF-e no e-mail corporativo. Para clientes recorrentes, resumo mensal.'
    teamEyebrow: Quem está ao volante
    teamTitle: Não é uma plataforma — são pessoas
    teamBody: Não somos agregador "quem está mais perto". As viagens são distribuídas entre 12 motoristas com quem trabalhamos diretamente e que você conhece pessoalmente antes da partida. Nome, foto e tempo de experiência aparecem no card após a confirmação do briefing.
