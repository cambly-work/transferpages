# Pre-built use cases / scenarios. Real-world combinations clients book often.
# Used by /<lang>/cases/.

scenarios:
  - id: business-sp-rio-day
    audience:
      ru: Бизнес-визит
      pt: Visita de negócios
      en: Business visit
    headline:
      ru: SP → Рио за один день
      pt: SP → Rio em um dia
      en: SP → Rio in a day
    summary:
      ru: "Выезд 6:00, встречи 10–17, возврат в 20:30. Один водитель — без переутомления. Тихий салон для созвонов."
      pt: "Saída às 6h, reuniões 10–17h, retorno às 20h30. Um motorista — sem fadiga. Cabine silenciosa para chamadas."
      en: "Depart 6 AM, meetings 10–5, return 8:30 PM. One driver — no overwork. Quiet cabin for calls."
    spec:
      vehicle: Sedan executivo
      pax: "1–2"
      duration: "~14 ч"
      route: "GRU → центр Rio → GIG"
      priceFromBrl: 3900
  - id: family-fln-bc-weekend
    audience:
      ru: Семья
      pt: Família
      en: Family
    headline:
      ru: Семья из 4 человек FLN → Балнеариу
      pt: Família de 4 FLN → Balneário
      en: Family of 4 FLN → Balneário
    summary:
      ru: "Прилёт в FLN с 4 чемоданами, детским креслом, остановка в BNU отеле. Возврат через 2 дня."
      pt: "Pouso em FLN com 4 malas, cadeirinha, parada no hotel em BNU. Retorno em 2 dias."
      en: "Land at FLN with 4 bags, child seat, drop at BNU hotel. Return 2 days later."
    spec:
      vehicle: Premium SUV
      pax: "4"
      duration: "~1ч 30 + ожидание"
      route: "FLN → BNU отель → FLN"
      priceFromBrl: 980
  - id: relocation-sp-curitiba
    audience:
      ru: Релокация
      pt: Relocação
      en: Relocation
    headline:
      ru: Релокация SP → Куритиба
      pt: Relocação SP → Curitiba
      en: Relocation SP → Curitiba
    summary:
      ru: "Семья + 8 мест багажа + домашнее животное. SUV для пассажиров и vans для вещей. Прибытие в новый адрес одновременно."
      pt: "Família + 8 volumes + pet. SUV para pessoas + vans para coisas. Chegada simultânea no novo endereço."
      en: "Family + 8 bags + pet. SUV for people + vans for stuff. Arrive at the new address together."
    spec:
      vehicle: SUV + Vans
      pax: "3–4 + багаж"
      duration: "~6 ч"
      route: "SP адрес → Curitiba новый адрес"
      priceFromBrl: 4200
  - id: corporate-iguazu
    audience:
      ru: Корпоративная группа
      pt: Grupo corporativo
      en: Corporate group
    headline:
      ru: Команда из 12 человек → Игуасу
      pt: Equipe de 12 → Foz do Iguaçu
      en: Team of 12 → Iguaçu
    summary:
      ru: "Минивэн из Куритибы, остановка с обедом, прибытие к началу встречи. Возвращение по плану на следующий день."
      pt: "Minivan saindo de Curitiba, parada para almoço, chegada para reunião. Retorno no dia seguinte."
      en: "Minivan from Curitiba, lunch stop, arrival in time for the meeting. Next-day return on plan."
    spec:
      vehicle: Mercedes Sprinter
      pax: "12"
      duration: "~8 ч"
      route: "Curitiba → Foz → Curitiba"
      priceFromBrl: 5800
  - id: uruguay-couple
    audience:
      ru: Романтическая поездка
      pt: Viagem romântica
      en: Romantic trip
    headline:
      ru: Пара POA → Punta del Este
      pt: Casal POA → Punta del Este
      en: Couple POA → Punta del Este
    summary:
      ru: "Прямой переход Chuí, ночёвка в Punta, документы и таможня готовы заранее. Возврат через 3 дня."
      pt: "Travessia direta pelo Chuí, pernoite em Punta, documentação pronta antes. Retorno em 3 dias."
      en: "Direct Chuí crossing, overnight in Punta, paperwork done upfront. Return in 3 days."
    spec:
      vehicle: Sedan executivo
      pax: "2"
      duration: "~12 ч"
      route: "POA → Chuí → Punta del Este"
      priceFromBrl: 5000
