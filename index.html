<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morrison Premium Transfer</title>
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://morrison-transfer.com/en/">
  <link rel="alternate" hreflang="ru" href="https://morrison-transfer.com/ru/">
  <link rel="alternate" hreflang="pt-BR" href="https://morrison-transfer.com/pt/">
  <link rel="alternate" hreflang="en" href="https://morrison-transfer.com/en/">
  <link rel="alternate" hreflang="x-default" href="https://morrison-transfer.com/en/">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>
    (function () {
      var supported = ['ru', 'pt', 'en'];
      var preferred = localStorage.getItem('preferredLanguage');
      var selected = 'en';

      if (supported.indexOf(preferred) !== -1) {
        selected = preferred;
      } else {
        var languages = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en'];
        for (var i = 0; i < languages.length; i += 1) {
          var lang = (languages[i] || '').toLowerCase();
          if (lang.indexOf('ru') === 0) {
            selected = 'ru';
            break;
          }
          if (lang.indexOf('pt') === 0) {
            selected = 'pt';
            break;
          }
          if (lang.indexOf('en') === 0) {
            selected = 'en';
            break;
          }
        }
      }

      window.location.replace('/' + selected + '/');
    })();
  </script>
</head>
<body>
  <noscript>
    <p><a href="/en/">Continue to English version</a></p>
  </noscript>
</body>
</html>
