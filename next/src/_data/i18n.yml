    title: "A viagem sob controle total."
    subtitle: "Service protocol · da solicitação ao retorno — seis fases."
    step1Title: "Solicitação registrada"
    step1Body: "Rota, data, passageiros, confidencialidade. Confirmação de recebimento em até 15 minutos."
    step2Title: "Avaliação de rota e segurança"
    step2Body: "Trânsito, janelas climáticas, pontos de pernoite, áreas de risco. Cenário alternativo — sempre."
    step3Title: "Confirmação do motorista"
    step3Body: "Nome, tempo de experiência, idiomas, foto — enviados antes da partida. Vínculo empregatício formal."
    step4Title: "Preparação do veículo"
    step4Body: "Inspeção técnica 24 horas antes. Água, carregadores, ajuste de clima, cadeirinha — sob pedido."
    step5Title: "Coordenação em tempo real"
    step5Body: "Despachante acompanha a viagem: tracking do voo, ajuste de ETA, mudanças de rota. Multilíngue."
    step6Title: "Chegada e follow-up"
    step6Body: "Apoio no destino, bagagem, coordenação do próximo segmento. Relatório financeiro no e-mail em até 5 dias."
  capabilities:
    eyebrow: "Operational capabilities"
    title: "O que coordenamos"
    lead: "Não é só 'levou'. Cada capacidade é parte de um protocolo único."
    c1Title: "Despachante 24/7"
    c1Body: "Contato com motorista e passageiro a qualquer hora. Troca de turno sem perda de contexto."
    c2Title: "Agenda flexível"
    c2Body: "Remarcação, cancelamento, ajuste de rota com uma hora de antecedência — operação de rotina."
    c3Title: "Adaptação a atrasos"
    c3Body: "Tracking por número do voo. O ETA é recalculado automaticamente, o motorista parte no novo horário."
    c4Title: "Ajuste de rota em movimento"
    c4Body: "Nova parada ou endereço — o despachante recalcula o trecho sem desmontar o plano do dia."
    c5Title: "Suporte multilíngue"
    c5Body: "Português, Русский, English, Español — comunicação no idioma do passageiro e do motorista."
    c6Title: "Manuseio de bagagem"
    c6Body: "Carga sensível, instrumentos, documentos — procedimento e seguro próprios."
    c7Title: "Trechos longos com pernoite"
    c7Body: "Trechos de 1000+ km com pernoite em hotel aprovado pelo cliente. Troca de motorista por protocolo."
    c8Title: "Coordenação de retirada privada"
    c8Body: "Sala VIP/FBO, estacionamento, contorno do terminal — alinhado com o aeroporto, sem espera na saída."
  vipBusiness:
    eyebrow: "Executive & corporate"
    title: "Para viagens corporativas e discretas"
    lead: "Quando a viagem faz parte do processo de trabalho, não é só deslocamento. Morrison atende C-level, investidores, delegações e eventos fechados."
    b1Title: "Transfers executivos de aeroporto"
    b1Body: "Recepção em FBO/sala VIP ou na porta do terminal com tracking de voo, cabine silenciosa e veículo sem logos."
    b2Title: "Mobilidade de investidores e delegações"
    b2Body: "Programas multi-dia em várias cidades com um único coordenador. Confidencialidade sob NDA."
    b3Title: "Rotas corporativas recorrentes"
    b3Body: "Trechos mensais com tarifa fixa e NF-e mensal emitida no CNPJ do cliente."
    b4Title: "Viagem confidencial"
    b4Body: "Sem marca no veículo, sem nomes em canais abertos, dados via canal seguro. NDA sob pedido."
    b5Title: "Coordenação com hotel e residência"
    b5Body: "Alinhamento com concierge, horário de check-in/out, estacionamento e retirada. O hóspede chega — o carro já está."
    b6Title: "Transporte de eventos"
    b6Body: "Casamentos, conferências, estreias — despachante dedicado, logística de grupo e tempo de buffer."
    ctaPrimary: "Discutir um programa"
    ctaSecondary: "Pedir proposta-base"
  geoNetwork:
    eyebrow: "Geografia de operação"
    title: "Uma rede de transporte, não uma lista de cidades"
    lead: "11 pontos em 4 países. A cobertura segue as rotas reais dos clientes, não pinta o mapa por extensão."
    g1Title: "Sul do Brasil"
    g1Cities: "Balneário Camboriú · Florianópolis · Curitiba · Porto Alegre · Joinville"
    g2Title: "Trechos longos"
    g2Cities: "São Paulo · Brasília · Rio de Janeiro · Foz do Iguaçu · Campinas"
    g3Title: "Trechos internacionais"
    g3Cities: "Uruguai · Paraguai · Argentina · travessia do Chuí · travessia Foz–Ciudad del Este"
  typicalJourneys:
    eyebrow: "Typical journeys"
    title: "Como aparece na prática"
    lead: "Cinco configurações reais que fazemos regularmente. Preços e tempos são referência, o valor exato vem após o briefing."
    j1Route: "Balneário Camboriú → São Paulo"
    j1Format: "Executive long-leg"
    j1Body: "~9 horas com pernoite em Curitiba. Premium SUV ou sedan executivo, despachante em contato a cada hora-chave."
    j2Route: "Florianópolis → Porto Alegre"
    j2Format: "Business intercity"
    j2Body: "~6h30. Cenário: saída de manhã, reunião à tarde, retorno na manhã seguinte."
    j3Route: "Aeroporto → residência privada"
    j3Format: "Private pickup"
    j3Body: "GRU/FLN/POA recepção via tracker, contorno do terminal, silêncio na cabine. NF-e ao corporativo."
    j4Route: "Sul do Brasil → fronteira do Uruguai"
