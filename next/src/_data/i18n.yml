    lead: В дальней поездке вы 8 часов проведёте с одним человеком. Кто это — мы рассказываем заранее, не "пришлю фото на месте".
    note: Все водители — официально оформлены, с действующими правами категории D или CNH B + EAR, с подтверждённым стажем работы с пассажирами и владением английским или испанским в той мере, которая нужна на маршруте.
    placeholder: Раздел собирается. Реальные карточки появятся после согласования с водителями — мы не публикуем фото и имена без письменного согласия.
  aboutPage:
    eyebrow: О компании
    title: Спокойный, организованный, предсказуемый результат.
    lead: Morrison Premium Transfer — частные трансферы по Бразилии и странам Mercosur с фиксированной ценой и согласованными условиями до выезда.
    valuesTitle: Чем мы отличаемся от такси и райдшеринга
    val1Title: Цена фиксируется до выезда
    val1Body: Никаких "счётчик показал больше" и доплат на полпути. Стоимость и условия — в письменном подтверждении.
    val2Title: Юридическая ответственность
    val2Body: Юр. лицо в Бразилии, страховка пассажиров, NF-e (электронная накладная) для бизнеса.
    val3Title: Мультиязычная поддержка
    val3Body: Заявки и сопровождение на русском, португальском и английском. Без "Google Translate в WhatsApp".
    val4Title: Подготовленный сценарий
    val4Body: Маршрут, остановки, документы для пересечения границы — собираем до выезда, а не на ходу.
    credentialsEyebrow: Документы и страховки
    credentialsTitle: На бумаге, не на словах
    credentialsLead: Premium — это в первую очередь юридическая чистота. Ниже — состав документов, которые мы готовы показать по запросу до заключения договора.
    credAnttTitle: ANTT · перевозки пассажиров
    credAnttBody: Регистрация в Agência Nacional de Transportes Terrestres для междугородних поездок. Без неё — это не «трансфер», а «частная подвозка».
    credAblaTitle: ABLA · отраслевая ассоциация
    credAblaBody: Членство в Associação Brasileira de Locadoras de Automóveis — стандарты сервиса, обмен опытом по инцидентам, доступ к коллективным условиям страховщиков.
    credDpvatTitle: DPVAT + корпоративная страховка
    credDpvatBody: Обязательное страхование (DPVAT) плюс корпоративный полис с расширенной ответственностью перед пассажирами на сумму до R$ 200 000 на жизнь.
    credLgpdTitle: LGPD · защита данных
    credLgpdBody: Заявки, телефон, имя пассажира — храним по требованиям Lei Geral de Proteção de Dados. По запросу удаляем или экспортируем за 5 рабочих дней.
    credNfeTitle: NF-e · электронные накладные
    credNfeBody: Каждой поездке — корректная Nota Fiscal Eletrônica на CNPJ заказчика. Подходит для возмещения через бухгалтерию иностранной компании или представительства.
    credCheckTitle: Проверка водителя
    credCheckBody: Справка об отсутствии судимости (Antecedentes Criminais) + CNH с EAR + минимум 5 лет стажа с пассажирами. Подтверждаемо через certidão.
    howWeWorkEyebrow: Как мы работаем
    howWeWorkTitle: Процесс — от заявки до отчёта
    howWeWorkStep1: '«Бриф» — за 24 часа до поездки фиксируем маршрут, тайминг, документы, аллергии и предпочтения.'
    howWeWorkStep2: '«Проверка» — за 6 часов: метеосводка, дорожные работы, прогноз пробок, состояние границы. Если что-то меняется — пишем сразу.'
    howWeWorkStep3: '«Поездка» — водитель встречает с табличкой по имени, машина пройдена за день до выезда. Связь с диспетчером каждые 30 мин на длинном плече.'
    howWeWorkStep4: '«Отчёт» — фото маршрута, чек времени, NF-e на корпоративный e-mail. Для регулярных клиентов — месячная сводка.'
    teamEyebrow: Кто за рулём
    teamTitle: Не платформа — конкретные люди
    teamBody: У нас не агрегатор «кому ближе». Поездки распределяются по 12 водителям, с которыми работаем напрямую и которых вы видим лично перед выездом. Имя, фото и стаж появятся в карточке после подтверждения брифа.
