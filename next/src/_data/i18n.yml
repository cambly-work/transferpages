    eyebrow: About
    title: Calm, organized, predictable result.
    lead: Morrison Premium Transfer — private transfers across Brazil and Mercosur countries with a fixed price and agreed conditions before departure.
    valuesTitle: How we differ from taxi and ride-sharing
    val1Title: Price locked before departure
    val1Body: No "the meter went higher" or surprise add-ons mid-route. Price and conditions in a written confirmation.
    val2Title: Legal accountability
    val2Body: Legal entity in Brazil, passenger insurance, NF-e (electronic invoice) for companies.
