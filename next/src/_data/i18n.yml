    subtitle: "Service protocol · request to return — six phases."
    step1Title: "Request submitted"
    step1Body: "Route, date, passengers, confidentiality. Acknowledgement within 15 minutes."
    step2Title: "Route & security assessment"
    step2Body: "Traffic, weather windows, overnight points, risk zones. A fallback scenario — always."
    step3Title: "Driver confirmation"
    step3Body: "Name, tenure, languages, photo — sent before departure. Formal employment."
    step4Title: "Vehicle preparation"
    step4Body: "Technical inspection 24 hours before departure. Water, chargers, cabin climate, child seat — on request."
    step5Title: "Live trip coordination"
    step5Body: "A dispatcher follows the trip: flight tracking, ETA adjustment, route changes. Multilingual."
    step6Title: "Arrival & follow-up"
    step6Body: "On-site assistance, luggage, coordination of the next segment. Financial report by email within 5 days."
  capabilities:
    eyebrow: "Operational capabilities"
    title: "What we coordinate"
    lead: "Not just 'we drove you'. Each capability is a link in a single protocol."
    c1Title: "24/7 dispatch"
    c1Body: "Contact with driver and passenger at any hour. Shift handover without losing context."
    c2Title: "Flexible scheduling"
    c2Body: "Reschedule, cancel, adjust the route an hour out — routine operation."
    c3Title: "Flight delay adaptation"
    c3Body: "Tracked by flight number. ETA recalculates automatically; the driver leaves on the new time."
    c4Title: "Route adjustment in transit"
    c4Body: "Added a stop or changed the address — the dispatcher reworks the leg without dismantling the day."
    c5Title: "Multilingual support"
    c5Body: "Português, Русский, English, Español — communication in the language of passenger and driver."
    c6Title: "Luggage handling"
    c6Body: "Sensitive cargo, instruments, documents — own procedure and insurance."
    c7Title: "Long-distance overnight"
    c7Body: "Legs of 1000+ km with overnight stays in client-approved hotels. Driver rotation per protocol."
    c8Title: "Private pickup coordination"
    c8Body: "VIP/FBO lounge, parking, terminal bypass — aligned with airport ops, no curbside wait."
  vipBusiness:
    eyebrow: "Executive & corporate"
    title: "Built for business travel and discretion"
    lead: "When the trip is part of a working process, not just movement. Morrison works with C-level, investors, delegations and closed events."
    b1Title: "Executive airport transfers"
    b1Body: "Pickup at FBO/VIP lounge or at the terminal exit with tracking, quiet cabin and unbranded vehicle."
    b2Title: "Investor & delegation mobility"
    b2Body: "Multi-day, multi-city programs with a single coordinator. Confidentiality under NDA."
    b3Title: "Recurring business routes"
    b3Body: "Monthly legs at a fixed rate with monthly NF-e to the corporate CNPJ."
    b4Title: "Confidential travel"
    b4Body: "No vehicle branding, no names in open channels, data over secure channels. NDA on request."
    b5Title: "Hotel & residence coordination"
    b5Body: "Aligned with concierge, check-in/out, parking and pickup point. Guest steps out — the car is already there."
    b6Title: "Event transportation"
    b6Body: "Weddings, conferences, premieres — dedicated dispatcher for the day, group logistics and buffer time."
    ctaPrimary: "Discuss a program"
    ctaSecondary: "Request a framework proposal"
  geoNetwork:
    eyebrow: "Geography of operation"
    title: "A transport network, not a list of cities"
    lead: "11 points across 4 countries. Coverage tracks where clients actually travel, not how much of the map we can colour."
    g1Title: "Southern Brazil"
