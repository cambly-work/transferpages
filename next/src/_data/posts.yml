  - slug: nfe-foreign-companies
    date: "2026-05-14"
    readMinutes: 6
    category:
      ru: Бизнес
      pt: Negócios
      en: Business
    title:
      ru: "NF-e для иностранных компаний в Бразилии"
      pt: "NF-e para empresas estrangeiras no Brasil"
      en: "NF-e for foreign companies in Brazil"
    excerpt:
      ru: "Что такое электронная фактура, зачем она нужна вашей бухгалтерии и какие данные требуются с вашей стороны."
      pt: "O que é a nota fiscal eletrônica, por que sua contabilidade precisa dela e quais dados são exigidos do seu lado."
      en: "What the electronic invoice is, why your accounting needs it and what data is required from your side."
    intro:
      ru: "NF-e (Nota Fiscal Eletrônica) — это обязательная электронная фактура в Бразилии. Для иностранной компании она нужна, если расходы на трансфер проходят через бразильское представительство или возмещаются по контракту. Мы выставляем NF-e на CNPJ заказчика за 5 рабочих дней после поездки."
      pt: "A NF-e (Nota Fiscal Eletrônica) é uma obrigação fiscal no Brasil. Para uma empresa estrangeira, é necessária quando as despesas com transfer passam por uma representação local ou são reembolsadas por contrato. Emitimos a NF-e no CNPJ do cliente em até 5 dias úteis após a viagem."
      en: "The NF-e (Nota Fiscal Eletrônica) is Brazil's mandatory electronic invoice. For a foreign company, it's required when transfer expenses go through a local rep office or are reimbursed under contract. We issue an NF-e to the client's CNPJ within 5 business days after the trip."
  - slug: payment-methods-brazil
    date: "2026-05-28"
    readMinutes: 3
    category:
      ru: Оплата
      pt: Pagamento
      en: Payment
    title:
      ru: "Pix, карта, счёт: что удобнее в Бразилии"
      pt: "Pix, cartão, boleto: o que é mais prático no Brasil"
      en: "Pix, card, invoice: what works best in Brazil"
    excerpt:
      ru: "Как принимаем оплату, что быстрее для разовых поездок, что лучше для компаний с регулярными выездами."
      pt: "Como recebemos pagamentos, o que é mais rápido para viagens pontuais, o que serve melhor para empresas recorrentes."
      en: "How we accept payment, what's fastest for one-off trips, what works best for companies with recurring runs."
    intro:
      ru: "Pix — мгновенная межбанковская оплата в Бразилии, работает 24/7 и без комиссии. Для разовых трансферов это самый быстрый способ. Карты тоже принимаем, но через эквайера — комиссия добавляется. Для постоянных партнёров — счёт с постоплатой, NF-e на CNPJ, оплата в течение 7-14 дней."
      pt: "Pix é a transferência instantânea brasileira — 24/7 e sem taxa. Para transfers pontuais é o mais rápido. Aceitamos cartão também, mas via adquirente — com taxa adicional. Para parceiros recorrentes, boleto com pagamento posterior, NF-e no CNPJ, prazo de 7 a 14 dias."
      en: "Pix is Brazil's instant interbank payment — 24/7 and fee-free. For one-off transfers, it's the fastest. We accept cards too, but through an acquirer — with a fee. For recurring partners, deferred-payment invoice, NF-e to the CNPJ, 7–14 days settlement."
