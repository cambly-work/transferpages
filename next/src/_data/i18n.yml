  hourlyPage:
    eyebrow: "By the hour"
    title: "Driver for the day or by the hour"
    lead: "When the trip isn't 'A → B' but a sequence of meetings, stops and waits. The car and driver are reserved for an agreed block of time."
    p2Title: "2 hours"
    p2Body: "Minimum package. Pickup, one or two stops, return. Suits short errand-style runs in the city."
    p4Title: "4 hours · half-day"
    p4Body: "Morning or evening block. Several meetings across the city, shopping, waiting at points."
    p8Title: "8 hours · full day"
    p8Body: "A full day in one or two cities. Meeting schedule, lunch pause, return by evening."
    p12Title: "12 hours · executive"
    p12Body: "Long workday with intercity travel. Includes road time, waits, late return."
    includesTitle: "What's included"
    inc1: "Driver, fuel, parking and tolls on the route"
    inc2: "Water, USB, climate settings, quiet cabin on request"
    inc3: "Waiting at points per agreed schedule — no meter"
    inc4: "Route changes mid-day — routine operation"
    notIncludesTitle: "Counted separately"
    notInc1: "Hours beyond the package — extension at the same rate"
    notInc2: "Intercity beyond 100 km one-way — recalculated at long-leg tariff"
    notInc3: "Escort segments with a second car — separate request"
    cta: "Arrange an hourly booking"
  eventsPage:
    eyebrow: "Group transport & events"
    title: "Logistics for delegations, events and groups"
    lead: "From a delegation with programmed transfers to the full transport logistics of a wedding or conference. Not 'several taxis at once' — a single operation with a dispatcher."
    g1Title: "Conferences and summits"
    g1Body: "Transfer programme for participants: airport → hotel → venue → hotel. Tracked by list. Reserve for delays."
    g2Title: "Weddings and celebrations"
    g2Body: "Wedding-day logistics: guests from the hotel, the couple's car, return after the celebration. Unbranded vehicles or with thematic décor."
    g3Title: "Corporate groups"
    g3Body: "Outings, team-building, group movements of 8 to 30+ people. Van or minibus, sometimes several vehicles."
    g4Title: "Delegations and road shows"
    g4Body: "3–5 days, several cities, up to 10 meeting points per day. Dedicated coordinator, daily report of kilometres and time."
    formatTitle: "How we work with groups"
    f1Title: "Briefing 7+ days ahead"
    f1Body: "The earlier the better for the reserve. Minimum — 48h for configurations up to 14 people, 7 days for 15+."
    f2Title: "One coordinator"
    f2Body: "Single comms channel. Not driver/dispatcher/manager in turn — one decision point."
    f3Title: "Contract and NF-e"
    f3Body: "Standard contract, NF-e to the organiser's CNPJ, report by segments."
    f4Title: "Backup vehicle"
    f4Body: "Events > 20 people — backup vehicle is standard. For delegations, agreed case-by-case."
    cta: "Discuss a programme"
  guaranteesPage:
    eyebrow: "Service guarantees"
    title: "What we guarantee in writing"
    lead: "Not 'it usually works out'. Concrete commitments covering each booking. If we breach, compensation per the schedule below."
    g1Title: "Booking acknowledgement"
    g1Body: "Within 15 minutes of receiving the briefing during business hours (09:00–22:00 BRT). Overnight window — within 30 minutes."
    g1Penalty: "Later response — 5 % discount on the trip."
    g2Title: "Pickup time"
    g2Body: "Driver on-site no later than the agreed time. Late starts counting at 5 minutes past ETA."
    g2Penalty: "On our fault — each full hour late = 25 % compensation (up to 100 %)."
    g3Title: "Airport wait"
    g3Body: "60 minutes after landing included, regardless of flight delay. Beyond that — at the agreed wait rate."
    g3Penalty: "If the driver leaves before the wait expires — replacement pickup on us."
    g4Title: "Documents and NF-e"
    g4Body: "NF-e issued to the client's CNPJ within 5 business days after the trip."
    g4Penalty: "If delayed — expedited issuance and bank-fee compensation if needed."
    g5Title: "Cancellation"
    g5Body: "Cancellation by us (breakdown, driver illness without replacement) — full refund + 20 % discount on the next trip."
    g5Penalty: ""
    g6Title: "Confidentiality"
    g6Body: "No sharing of route/name with third parties. NDA on request. Data encrypted."
    g6Penalty: "Breach by crew = contract termination and damages."
    cta: "Request the full terms"
