  aboutPage:
    eyebrow: Acerca
    title: Resultado tranquilo, organizado, previsible.
    lead: Morrison Premium Transfer — transfers privados por Brasil y países del Mercosur con precio fijo y condiciones acordadas antes de salir.
    valuesTitle: Cómo nos diferenciamos de taxi y ride-sharing
    val1Title: Precio fijado antes de salir
    val1Body: Nada de "el taxímetro marcó más" ni cargos a mitad de camino. Precio y condiciones — en confirmación escrita.
    val2Title: Responsabilidad jurídica
    val2Body: Entidad en Brasil, seguro de pasajeros, NF-e (factura electrónica) para empresas.
    val3Title: Soporte multilingüe
    val3Body: Solicitudes y soporte en ruso, portugués, inglés y español. Sin "Google Translate por WhatsApp".
    val4Title: Escenario preparado
    val4Body: Ruta, paradas, documentos de cruce fronterizo — montados antes, no en la carretera.
    credentialsEyebrow: Documentos y seguros
    credentialsTitle: En papel, no sólo de palabra
    credentialsLead: Premium empieza por el cumplimiento legal. Estos son los documentos que mostramos bajo pedido antes de cualquier contrato.
    credAnttTitle: ANTT · transporte de pasajeros
    credAnttBody: Registrados en la Agência Nacional de Transportes Terrestres para viajes interestaduales. Sin eso no es "transfer", es un viaje compartido.
    credAblaTitle: ABLA · asociación sectorial
    credAblaBody: Miembros de la Asociación Brasileña de Empresas de Alquiler de Vehículos — estándares de servicio, intercambio de experiencias sobre incidentes, acceso a condiciones colectivas de aseguradoras.
    credDpvatTitle: DPVAT + seguro corporativo
    credDpvatBody: Seguro obligatorio (DPVAT) más póliza corporativa con responsabilidad extendida sobre pasajeros hasta R$ 200.000 por vida.
    credLgpdTitle: LGPD · protección de datos
    credLgpdBody: Solicitudes, teléfono, nombre del pasajero — almacenados según la Lei Geral de Proteção de Dados. Eliminamos o exportamos bajo pedido en 5 días hábiles.
    credNfeTitle: NF-e · factura electrónica
    credNfeBody: Cada viaje respaldado con NF-e válida al CNPJ del cliente. Sirve para reembolso por la contabilidad de empresa extranjera o representación local.
    credCheckTitle: Driver background check
    credCheckBody: Antecedentes Criminales + CNH con EAR + mínimo 5 años de experiencia con pasajeros. Verificable vía certidão.
    howWeWorkEyebrow: Cómo trabajamos
    howWeWorkTitle: Proceso — del pedido al informe
    howWeWorkStep1: '"Brief" — 24 horas antes del viaje fijamos ruta, horarios, documentos, alergias y preferencias.'
    howWeWorkStep2: '"Verificación" — 6 horas antes: clima, obras viales, pronóstico de tránsito, estado fronterizo. Si algo cambia, avisamos de inmediato.'
    howWeWorkStep3: '"Viaje" — el conductor te recibe con cartel con nombre, vehículo inspeccionado el día previo. Contacto con central cada 30 min en trayecto largo.'
    howWeWorkStep4: '"Informe" — fotos de la ruta, registro de tiempo, NF-e al correo corporativo. Para clientes recurrentes, resumen mensual.'
    teamEyebrow: Quién está al volante
    teamTitle: No es una plataforma — son personas
    teamBody: No somos agregador "el más cercano". Los viajes se distribuyen entre 12 conductores con los que trabajamos directamente y que conocerás en persona antes de partir. Nombre, foto y experiencia aparecen en la ficha tras confirmar el brief.
