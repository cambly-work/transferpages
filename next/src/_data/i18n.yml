    title: Veículos para tarefas concretas.
    lead: Não "temos premium", mas concreto — modelo, lugares, bagagem, o que tem dentro. A classe é escolhida antes conforme o formato da viagem.
    note: As fotos da frota atual são atualizadas. O modelo exato para cada viagem é confirmado na reserva.
