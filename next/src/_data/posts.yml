    intro:
      ru: "Большинство турагентств отправляют гостя на «обзорный день» — приезжаешь в 11:00 на бразильскую сторону, к водопадам подходишь к полудню, толпа уже растёт. Если у вас 36 часов и важное окно, есть другая схема — мы разъясняем тайминг по часам, какие билеты покупаем заранее и как избежать очередей."
      pt: "A maioria das agências oferece um 'dia panorâmico' — chegando ao lado brasileiro às 11:00, você encontra as cataratas ao meio-dia com a multidão já formada. Se você tem 36 horas e uma janela importante, há outra forma — explicamos o cronograma por hora, quais ingressos compramos antes e como evitar filas."
      en: "Most travel agencies push a 'panoramic day' — you arrive at the Brazilian side at 11 AM, reach the falls at noon, by which point the crowd is already growing. If you have 36 hours and a meaningful window, there is another way — we explain the timing hour-by-hour, which tickets we purchase in advance, and how to skip queues."
      es: "La mayoría de las agencias venden un 'día panorámico' — llegando al lado brasileño a las 11 AM ya hay multitud al mediodía. Si tienes 36 horas y una ventana relevante, hay otra forma — explicamos el cronograma hora por hora, qué entradas compramos por adelantado y cómo evitar colas."
