  aboutPage:
    eyebrow: About
    title: Calm, organized, predictable result.
    lead: Morrison Premium Transfer — private transfers across Brazil and Mercosur countries with a fixed price and agreed conditions before departure.
    valuesTitle: How we differ from taxi and ride-sharing
    val1Title: Price locked before departure
    val1Body: No "the meter went higher" or surprise add-ons mid-route. Price and conditions in a written confirmation.
    val2Title: Legal accountability
    val2Body: Legal entity in Brazil, passenger insurance, NF-e (electronic invoice) for companies.
    val3Title: Multilingual support
    val3Body: Requests and support in Russian, Portuguese and English. No "Google Translate over WhatsApp".
    val4Title: Prepared scenario
    val4Body: Route, stops, border-crossing documents — assembled before the trip, not on the road.
    credentialsEyebrow: Paperwork and insurance
    credentialsTitle: On paper, not just in conversation
    credentialsLead: Premium starts with legal cleanliness. The documents below are available on request before any contract is signed.
    credAnttTitle: ANTT · passenger transport
    credAnttBody: Registered with Agência Nacional de Transportes Terrestres for interstate trips. Without it, it isn't a "transfer" — it's a ride-along.
    credAblaTitle: ABLA · industry association
    credAblaBody: Member of the Brazilian Vehicle Rental Association — service standards, incident knowledge sharing, access to collective insurance terms.
    credDpvatTitle: DPVAT + corporate insurance
    credDpvatBody: Mandatory insurance (DPVAT) plus a corporate policy with extended passenger liability up to R$ 200,000 per life.
    credLgpdTitle: LGPD · data protection
    credLgpdBody: Requests, phone numbers, passenger names — stored per Brazil's Lei Geral de Proteção de Dados. Deleted or exported on request within 5 business days.
    credNfeTitle: NF-e · electronic invoicing
    credNfeBody: Every trip backed by a valid NF-e to the client's CNPJ. Works for reimbursement through a foreign company's accounting or local representation.
    credCheckTitle: Driver background check
    credCheckBody: Criminal-record check + CNH with EAR endorsement + minimum 5 years of passenger experience. Verifiable via certidão.
    howWeWorkEyebrow: How we work
    howWeWorkTitle: Process — from request to report
    howWeWorkStep1: '"Brief" — 24 hours before the trip we lock route, timing, documents, allergies and preferences.'
    howWeWorkStep2: '"Check" — 6 hours out: weather, roadworks, traffic forecast, border status. If anything shifts, we ping you immediately.'
    howWeWorkStep3: '"Trip" — driver meets you with a name sign, vehicle inspected the day before. Dispatcher contact every 30 minutes on a long leg.'
    howWeWorkStep4: '"Report" — route photos, time log, NF-e to the corporate e-mail. For recurring clients, a monthly summary.'
    teamEyebrow: Who is at the wheel
    teamTitle: Not a platform — actual people
    teamBody: We're not a "whoever is closest" aggregator. Trips are distributed across 12 drivers we work with directly, and whom you'll meet in person before departure. Name, photo and tenure appear on the card after brief confirmation.
