<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morrison Premium Transfer</title>
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://morrison-transfer.com/">
  <link rel="alternate" hreflang="ru" href="https://morrison-transfer.com/ru/">
  <link rel="alternate" hreflang="pt-BR" href="https://morrison-transfer.com/pt/">
  <link rel="alternate" hreflang="en" href="https://morrison-transfer.com/en/">
  <link rel="alternate" hreflang="x-default" href="https://morrison-transfer.com/">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>
    (function () {
      var SUPPORTED = ['ru', 'pt', 'en'];
      var defaultLanguage = 'en';
      var storageKey = 'preferredLanguage';

      function getFromStorage() {
        try {
          return localStorage.getItem(storageKey);
        } catch (error) {
          return null;
        }
      }

      function detectFromBrowser() {
        var languages = (navigator.languages && navigator.languages.length)
          ? navigator.languages
          : [navigator.language || defaultLanguage];

        for (var i = 0; i < languages.length; i += 1) {
          var lang = String(languages[i] || '').toLowerCase();
          if (lang.indexOf('ru') === 0) return 'ru';
          if (lang.indexOf('pt') === 0) return 'pt';
          if (lang.indexOf('en') === 0) return 'en';
        }

        return defaultLanguage;
      }

      function resolveBasePath(pathname) {
        var cleanPath = String(pathname || '/').replace(/index\.html$/, '');
        if (cleanPath.slice(-1) !== '/') cleanPath += '/';

        // Root can be either "/" (custom domain) or "/repo/" (GitHub Pages project site).
        var segments = cleanPath.split('/').filter(Boolean);
        if (!segments.length) return '/';
        return '/' + segments.join('/') + '/';
      }

      var preferred = getFromStorage();
      var selectedLanguage = SUPPORTED.indexOf(preferred) !== -1 ? preferred : detectFromBrowser();
      var basePath = resolveBasePath(window.location.pathname);
      var targetPath = basePath + selectedLanguage + '/';

      window.location.replace(targetPath);
    })();
  </script>
</head>
<body>
  <noscript>
    <p><a href="./en/">Continue to English version</a></p>
  </noscript>
</body>
</html>
