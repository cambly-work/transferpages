  howItWorks:
    title: "Поездка под полным контролем."
    subtitle: "Протокол сервиса · от заявки до возвращения — шесть фаз."
    step1Title: "Запрос принят"
    step1Body: "Маршрут, дата, пассажиры, конфиденциальность. Подтверждение получения — в течение 15 минут."
    step2Title: "Оценка маршрута и безопасности"
    step2Body: "Дорожная обстановка, погодные коридоры, пункты ночёвки, точки риска. Альтернативный сценарий — всегда."
    step3Title: "Подтверждение водителя"
    step3Body: "Имя, стаж, языки, фото — присылается до выезда. Контракт водителя — официальный."
    step4Title: "Подготовка автомобиля"
    step4Body: "Технический осмотр за 24 часа до выезда. Вода, зарядки, климат-настройки, детское кресло — по запросу."
    step5Title: "Координация в реальном времени"
    step5Body: "Диспетчер сопровождает поездку: трекинг рейса, подстройка ETA, изменения маршрута. Multilingual."
    step6Title: "Прибытие и follow-up"
    step6Body: "Помощь на месте, передача багажа, координация следующего сегмента. Финансовый отчёт — на e-mail в течение 5 дней."
  capabilities:
    eyebrow: "Операционные возможности"
    title: "Что мы координируем"
    lead: "Не просто «довезли». Каждая способность — звено единого протокола."
    c1Title: "Диспетчер 24/7"
    c1Body: "Связь с экипажем и пассажиром в любой час. Передача смены — без потери контекста."
    c2Title: "Гибкое расписание"
    c2Body: "Перенос, отмена, корректировка маршрута за час — рутинная операция."
    c3Title: "Адаптация к задержкам рейса"
    c3Body: "Трекинг по номеру рейса. ETA пассажира пересчитывается автоматически, водитель ставится на новое время."
    c4Title: "Корректировка маршрута в дороге"
    c4Body: "Добавили остановку или сменили адрес — диспетчер пересчитывает плечо, не теряя плана дня."
    c5Title: "Многоязычная поддержка"
    c5Body: "Português, Русский, English, Español — связь на родном языке пассажира и водителя."
    c6Title: "Обработка багажа"
    c6Body: "Чувствительный груз, инструмент, документы — отдельная процедура и страхование."
    c7Title: "Дальние плечи с ночёвкой"
    c7Body: "Плечи 1000+ км с гостиницей категории, утверждённой заказчиком. Смена водителя — по протоколу."
    c8Title: "Координация частной встречи"
    c8Body: "VIP-зал, парковка, обход терминала — согласовано с аэропортом, без задержек у выхода."
  vipBusiness:
    eyebrow: "Бизнес и VIP"
    title: "Для бизнес-клиентов и закрытых поездок"
    lead: "Когда поездка — часть рабочего процесса, а не просто перемещение. Морисон работает с C-level, инвесторами, делегациями и закрытыми мероприятиями."
    b1Title: "Executive-встречи в аэропорту"
    b1Body: "Встреча в FBO/VIP-зале или у выхода из терминала с трекингом рейса, бесшумной кабиной и без логотипов на машине."
    b2Title: "Логистика инвесторов и делегаций"
    b2Body: "Многодневные программы по нескольким городам с одним координатором. Конфиденциальность по NDA."
    b3Title: "Постоянные корпоративные маршруты"
    b3Body: "Ежемесячные плечи с фиксированной ставкой и месячным NF-e в адрес юр. лица."
    b4Title: "Конфиденциальные поездки"
    b4Body: "Без логотипов, без имён в открытых каналах, передача данных по защищённому каналу. По запросу — NDA."
    b5Title: "Координация с отелем и резиденцией"
    b5Body: "Согласование с консьержем, временем check-in/out, парковкой и подачей. Гость выходит — машина уже стоит."
    b6Title: "Транспорт для мероприятий"
    b6Body: "Свадьбы, конференции, премьеры — выделенный диспетчер на день, групповая логистика и буферное время."
    ctaPrimary: "Обсудить программу"
    ctaSecondary: "Запросить рамочное предложение"
  geoNetwork:
    eyebrow: "География работы"
    title: "Транспортная сеть, а не список городов"
    lead: "11 точек в 4 странах. Покрытие выстроено вдоль реальных маршрутов клиентов, а не на карте по принципу «и тут возим»."
    g1Title: "Юг Бразилии"
    g1Cities: "Балнеариу-Камбориу · Флорианополис · Куритиба · Порту-Алегри · Жоинвили"
    g2Title: "Длинные плечи"
    g2Cities: "Сан-Паулу · Бразилиа · Рио-де-Жанейро · Фос-ду-Игуасу · Кампинас"
    g3Title: "Международные плечи"
    g3Cities: "Уругвай · Парагвай · Аргентина · переход Чуй · переход Foz–Ciudad del Este"
  typicalJourneys:
    eyebrow: "Типичные сценарии"
    title: "Как это выглядит на практике"
    lead: "Пять реальных конфигураций, которые мы делаем регулярно. Цены и тайминг — ориентир, точная сумма — после брифа."
    j1Route: "Балнеариу-Камбориу → Сан-Паулу"
    j1Format: "Бизнес-плечо"
    j1Body: "~9 часов с ночёвкой в Куритибе. Премиум-SUV или бизнес-седан, диспетчер на связи в каждый ключевой час."
    j2Route: "Флорианополис → Порту-Алегри"
    j2Format: "Бизнес-межгород"
    j2Body: "~6,5 часов. Сценарий: утренний выезд, встреча после обеда, обратный сегмент следующим утром."
    j3Route: "Аэропорт → частная резиденция"
    j3Format: "Частная встреча"
    j3Body: "GRU/FLN/POA — встреча по треку рейса, обход терминала, тишина в салоне. NF-e на корпоратив."
    j4Route: "Юг Бразилии → граница Уругвая"
    j4Format: "Международный"
    j4Body: "Чуй или Жагуарьон. Документы согласованы за 48 часов, переход — одной поездкой."
    j5Route: "Координация бизнес-делегации"
    j5Format: "Многодневная программа"
    j5Body: "3–5 дней, несколько городов, выделенный диспетчер, отчёт по поездкам и километрам ежедневно."
  hourlyPage:
    eyebrow: "Почасовой сервис"
    title: "Водитель на день и по часам"
    lead: "Когда поездка — не «точка А → точка Б», а несколько встреч, остановок и ожиданий подряд. Машина и водитель закрепляются за вами на согласованный период."
    p2Title: "2 часа"
    p2Body: "Минимальный пакет. Подача, одна–две остановки, возврат. Подходит для коротких выездов в городе."
    p4Title: "4 часа · полдня"
    p4Body: "Утренний или вечерний блок. Несколько встреч в городе, шопинг, ожидание у точек."
    p8Title: "8 часов · день"
    p8Body: "Полный день в одном или двух городах. Расписание встреч, обеденная пауза, возврат к вечеру."
    p12Title: "12 часов · executive"
    p12Body: "Длинный рабочий день с поездкой между городами. Включает дорожное время, ожидания, поздний возврат."
    includesTitle: "Что включено"
    inc1: "Водитель, топливо, парковка и платные дороги на маршруте"
    inc2: "Вода, USB, климат-настройка, тишина в салоне по запросу"
    inc3: "Ожидание у точек по согласованному графику без счётчика"
    inc4: "Изменение маршрута в течение дня — стандартная операция"
    notIncludesTitle: "Что считается отдельно"
    notInc1: "Сверх-нормативные часы — продление по той же ставке"
    notInc2: "Межгород больше 100 км в одну сторону — пересчёт по тарифу длинного плеча"
    notInc3: "Эскорт-сегменты с другой машиной — отдельная заявка"
    cta: "Согласовать почасовую поездку"
  eventsPage:
    eyebrow: "Группы и мероприятия"
    title: "Логистика для делегаций, событий и групп"
    lead: "От делегации с трансферами по программе до полной транспортной логистики свадьбы или конференции. Не «несколько такси одновременно», а единая операция с диспетчером."
    g1Title: "Конференции и саммиты"
    g1Body: "Программа подвозок участников: аэропорт → отель → площадка → отель. Контроль по списку. Резерв на задержки."
    g2Title: "Свадьбы и торжества"
    g2Body: "Логистика дня свадьбы: гости из отеля, машина пары, развоз после торжества. Бренд-нейтральные машины или с тематическим декором."
    g3Title: "Корпоративные группы"
    g3Body: "Outings, тимбилдинги, групповые перемещения 8–30+ человек. Van или микроавтобус, иногда несколько машин."
    g4Title: "Делегации и road-show"
    g4Body: "3–5 дней, несколько городов, до 10 точек встреч в день. Выделенный координатор, ежедневный отчёт по километрам и времени."
    formatTitle: "Как мы работаем с группами"
    f1Title: "Бриф за 7+ дней"
    f1Body: "Чем раньше, тем лучше резерв. Минимум — 48 часов для конфигураций до 14 человек, 7 дней для 15+."
    f2Title: "Один координатор"
    f2Body: "Связь по одному каналу. Не водитель/диспетчер/менеджер по очереди — единая точка принятия решений."
    f3Title: "Контракт и NF-e"
    f3Body: "Стандартный договор, NF-e на CNPJ организатора, отдельный отчёт по сегментам."
    f4Title: "Резервная машина"
    f4Body: "На событиях > 20 человек — резерв стандартен. На делегациях по согласованию."
    cta: "Обсудить программу"
  guaranteesPage:
    eyebrow: "Service guarantees"
    title: "Что мы гарантируем письменно"
    lead: "Не «обычно всё хорошо». Конкретные обязательства, которые покрывают каждую заявку. Нарушим — компенсация ниже описанной."
    g1Title: "Подтверждение заявки"
    g1Body: "Не позже 15 минут после получения брифа в рабочее время (09:00–22:00 BRT). В ночное окно — до 30 минут."
    g1Penalty: "Если ответ позже — 5 % скидка на поездку."
    g2Title: "Время подачи"
    g2Body: "Водитель на месте не позже согласованного времени. Опоздание считается как минимум 5 минут после ETA."
    g2Penalty: "При нашей вине — каждый полный час опоздания = 25 % компенсация (до 100 %)."
    g3Title: "Время ожидания в аэропорту"
    g3Body: "60 минут после посадки рейса включено, не зависит от задержек самолёта. Дальше — по согласованному тарифу ожидания."
    g3Penalty: "Если водитель уехал до окончания ожидания — повторная подача за наш счёт."
    g4Title: "Документы и NF-e"
    g4Body: "NF-e выставляется на CNPJ заказчика в течение 5 рабочих дней после поездки."
    g4Penalty: "При задержке — ускорение и компенсация банковской комиссии при необходимости."
    g5Title: "Резерв на отмену"
    g5Body: "Отмена с нашей стороны (поломка, болезнь водителя без замены) — полный возврат + 20 % скидка на следующую поездку."
    g5Penalty: ""
    g6Title: "Конфиденциальность"
    g6Body: "Без передачи маршрута/имени третьим лицам. NDA по запросу. Данные шифруются."
    g6Penalty: "Нарушение со стороны экипажа = аннулирование договора и возмещение."
    cta: "Получить полные условия"
