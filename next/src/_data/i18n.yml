    j4Format: "Cruce internacional"
    j4Body: "Chuí o Jaguarão. Documentos validados 48h antes, cruce en un solo viaje."
    j5Route: "Coordinación de delegación corporativa"
    j5Format: "Programa multi-día"
    j5Body: "3–5 días, varias ciudades, despachador dedicado, informe diario de viajes y km."
  hourlyPage:
    eyebrow: "Servicio por hora"
    title: "Conductor por el día o por hora"
    lead: "Cuando el viaje no es 'punto A → punto B', sino varias reuniones, paradas y esperas seguidas. El vehículo y el conductor quedan reservados por el período acordado."
    p2Title: "2 horas"
    p2Body: "Paquete mínimo. Recogida, una o dos paradas, regreso. Bueno para salidas cortas en la ciudad."
    p4Title: "4 horas · medio día"
    p4Body: "Bloque de mañana o tarde. Varias reuniones por la ciudad, compras, esperas en los puntos."
    p8Title: "8 horas · día completo"
    p8Body: "Un día completo en una o dos ciudades. Cronograma de reuniones, pausa de almuerzo, regreso por la tarde."
    p12Title: "12 horas · ejecutivo"
    p12Body: "Día de trabajo largo con desplazamiento entre ciudades. Incluye tiempo de carretera, esperas, regreso tarde."
    includesTitle: "Qué incluye"
    inc1: "Conductor, combustible, estacionamiento y peajes en la ruta"
    inc2: "Agua, USB, ajuste climático, cabina silenciosa bajo pedido"
    inc3: "Esperas en los puntos según cronograma, sin taxímetro"
    inc4: "Cambios de ruta durante el día — operación estándar"
    notIncludesTitle: "Lo que cuenta aparte"
    notInc1: "Horas más allá del paquete — extensión a la misma tarifa"
    notInc2: "Interurbano de más de 100 km por trayecto — recálculo por tarifa de tramo largo"
    notInc3: "Segmentos de escolta con otro vehículo — solicitud separada"
    cta: "Reservar servicio por hora"
  eventsPage:
    eyebrow: "Grupos y eventos"
    title: "Logística para delegaciones, eventos y grupos"
    lead: "Desde una delegación con transfers programados hasta la logística completa de transporte de una boda o conferencia. No 'varios taxis a la vez', sino una operación única con despachador."
    g1Title: "Conferencias y cumbres"
    g1Body: "Programa de transfer para participantes: aeropuerto → hotel → sede → hotel. Control por lista. Reserva para retrasos."
    g2Title: "Bodas y celebraciones"
    g2Body: "Logística del día de la boda: invitados desde el hotel, vehículo de la pareja, regreso tras la celebración. Vehículos sin marcas o con decoración temática."
    g3Title: "Grupos corporativos"
    g3Body: "Outings, team buildings, desplazamientos en grupo de 8 a 30+ personas. Van o minibús, a veces varios vehículos."
    g4Title: "Delegaciones y road-show"
    g4Body: "3–5 días, varias ciudades, hasta 10 puntos de reunión por día. Coordinador dedicado, informe diario de km y tiempo."
    formatTitle: "Cómo trabajamos con grupos"
    f1Title: "Briefing con 7+ días de antelación"
    f1Body: "Cuanto antes, mejor la reserva. Mínimo — 48h para configuraciones hasta 14 personas, 7 días para 15+."
    f2Title: "Un único coordinador"
    f2Body: "Comunicación por un canal. No conductor/despachador/gerente por turnos — un punto único de decisión."
    f3Title: "Contrato y NF-e"
    f3Body: "Contrato estándar, NF-e al CNPJ del organizador, informe por segmentos."
    f4Title: "Vehículo de reserva"
    f4Body: "En eventos > 20 personas — reserva estándar. Para delegaciones, según acuerdo."
    cta: "Discutir el programa"
  guaranteesPage:
    eyebrow: "Service guarantees"
    title: "Lo que garantizamos por escrito"
    lead: "No 'normalmente sale bien'. Compromisos concretos que cubren cada reserva. Si incumplimos, compensación según se describe abajo."
    g1Title: "Confirmación del pedido"
    g1Body: "En 15 minutos tras recibir el briefing en horario comercial (09:00–22:00 BRT). Ventana nocturna — en 30 minutos."
    g1Penalty: "Respuesta tardía — 5 % de descuento en el viaje."
    g2Title: "Hora de recogida"
    g2Body: "Conductor en el lugar no más tarde de la hora acordada. El retraso cuenta a partir de 5 minutos pasado el ETA."
    g2Penalty: "Por culpa nuestra — cada hora completa de retraso = 25 % de compensación (hasta 100 %)."
    g3Title: "Espera en aeropuerto"
    g3Body: "60 minutos después del aterrizaje incluidos, independientes del retraso del vuelo. Después — según tarifa de espera acordada."
    g3Penalty: "Si el conductor se va antes de terminar la espera — recogida de reemplazo por nuestra cuenta."
    g4Title: "Documentos y NF-e"
    g4Body: "NF-e emitida al CNPJ del cliente en 5 días hábiles tras el viaje."
    g4Penalty: "En caso de retraso — emisión acelerada y compensación de comisión bancaria si es necesario."
    g5Title: "Cancelación"
    g5Body: "Cancelación por nuestra parte (avería, enfermedad del conductor sin reemplazo) — reembolso completo + 20 % de descuento en el próximo viaje."
    g5Penalty: ""
    g6Title: "Confidencialidad"
    g6Body: "Sin transmitir ruta/nombre a terceros. NDA bajo pedido. Datos cifrados."
    g6Penalty: "Incumplimiento por parte del equipo = rescisión del contrato y compensación."
    cta: "Pedir las condiciones completas"
  driversPage:
    eyebrow: "Carrera en Morrison"
    title: "Ser conductor de Morrison"
    lead: "Sumamos conductores para regiones y combinaciones de idiomas concretas. Si cumples — envía tu solicitud."
    requirementsTitle: "Requisitos"
    req1: "CNH categoría D o CNH B con EAR (Exercício de Atividade Remunerada)"
    req2: "Mínimo 5 años de experiencia con pasajeros"
    req3: "Sin antecedentes — certificado de Antecedentes Criminales"
    req4: "Inglés conversacional (B1+) o español. Opcional: ruso, italiano, alemán"
    req5: "Vehículo propio o alquilado de categoría premium (Toyota Altis, SW4, Sprinter y similares)"
    req6: "Disponibilidad para tramos largos y cruces internacionales"
    offerTitle: "Lo que ofrecemos"
    off1: "Flujo estable de pedidos premium, sin turnos de 12 horas con taxímetro"
    off2: "Tarifas transparentes por tabla, sin batalla con agregadores"
    off3: "Formalización legal, NF-e a tu CNPJ o MEI"
    off4: "Capacitación en confidencialidad, seguridad y atención VIP"
    off5: "Grupo cerrado de conductores de la red — intercambio de experiencia, casos, contactos"
    applyTitle: "Enviar solicitud"
    applyLead: "Envía un briefing por WhatsApp o por el formulario de contacto con la etiqueta 'driver'. Respondemos en 3 días hábiles."
    applyCta: "Enviar solicitud"
