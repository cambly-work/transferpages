  - slug: documents-chui
    date: "2026-04-12"
    readMinutes: 4
    category:
      ru: Документы
      pt: Documentos
      en: Documents
    title:
      ru: "Документы для пересечения Чуй (Бразилия → Уругвай)"
      pt: "Documentos para travessia do Chuí (Brasil → Uruguai)"
      en: "Documents for the Chuí crossing (Brazil → Uruguay)"
    excerpt:
      ru: "Паспорта, формат полицейского контроля, что разрешено везти, что декларируется и где обычно встают."
      pt: "Passaportes, formato do controle de fronteira, o que pode levar, o que declarar e onde a fila costuma se formar."
      en: "Passports, border-control format, what you can bring, what gets declared and where the queue usually forms."
    intro:
      ru: "Чуй — самый отлаженный наземный переход между Бразилией и Уругваем. Документы простые, но есть нюансы: одна сторона проверяется бразильской Polícia Federal, другая — уругвайской миграцией. Машина пересекает границу одной поездкой."
      pt: "O Chuí é a travessia terrestre mais consolidada entre Brasil e Uruguai. Os documentos são simples, mas existem detalhes: um lado é controlado pela Polícia Federal brasileira, o outro pela Migración uruguaia. O carro atravessa em uma só etapa."
      en: "Chuí is the most-run land crossing between Brazil and Uruguay. Documents are simple, but there are details: one side is controlled by Brazilian Polícia Federal, the other by Uruguayan Migración. The car crosses in a single pass."
  - slug: uruguay-seasons
    date: "2026-04-22"
    readMinutes: 5
    category:
      ru: Сезоны
      pt: Temporadas
      en: Seasons
    title:
      ru: "Сезонность в Уругвае: когда ехать в Пунта-дель-Эсте"
      pt: "Sazonalidade no Uruguai: quando ir para Punta del Este"
      en: "Seasonality in Uruguay: when to go to Punta del Este"
    excerpt:
      ru: "Высокий сезон, межсезонье, цены отелей и пробки на трассе IB-9 — что учитывать при планировании."
      pt: "Alta temporada, entressafra, preços de hotéis e trânsito na IB-9 — o que considerar no planejamento."
      en: "High season, shoulder, hotel pricing and IB-9 traffic — what to factor when planning."
    intro:
      ru: "Decembre–февраль — пик: цены × 2-3, пробки на въезде в Punta каждые выходные. Март — лучший месяц для тех, кто хочет атмосферу без толпы. С июня по сентябрь — низкий сезон, многое закрыто, но если едете по делу, цены адекватные."
      pt: "Dezembro–fevereiro é o pico: preços × 2-3, trânsito na entrada de Punta todo fim de semana. Março é o melhor mês para quem quer a atmosfera sem multidão. Junho a setembro é baixa temporada, com muita coisa fechada — mas se for a trabalho, preços razoáveis."
      en: "December–February is peak: prices × 2-3, traffic at Punta's entrance every weekend. March is the best month for the atmosphere without crowds. June to September is low season — much closed, but if you travel on business, prices are reasonable."
