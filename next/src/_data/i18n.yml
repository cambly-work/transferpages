    title: "Lo que coordinamos"
    lead: "No es solo 'te llevó'. Cada capacidad es parte de un mismo protocolo."
    c1Title: "Despachador 24/7"
    c1Body: "Contacto con conductor y pasajero a cualquier hora. Cambio de turno sin perder contexto."
    c2Title: "Agenda flexible"
    c2Body: "Reprogramar, cancelar, ajustar la ruta con una hora de antelación — operación de rutina."
    c3Title: "Adaptación a retrasos de vuelo"
    c3Body: "Seguimiento por número de vuelo. El ETA se recalcula automáticamente; el conductor sale a la nueva hora."
    c4Title: "Ajuste de ruta en marcha"
    c4Body: "Nueva parada o dirección — el despachador rehace el tramo sin desmontar el plan del día."
    c5Title: "Soporte multilingüe"
    c5Body: "Português, Русский, English, Español — comunicación en el idioma del pasajero y del conductor."
    c6Title: "Manejo de equipaje"
    c6Body: "Carga sensible, instrumentos, documentos — procedimiento y seguro propios."
    c7Title: "Trayectos largos con pernocte"
    c7Body: "Tramos de 1000+ km con pernocte en hotel aprobado por el cliente. Rotación de conductor por protocolo."
    c8Title: "Coordinación de retiro privado"
    c8Body: "Sala VIP/FBO, estacionamiento, evitar terminal — alineado con el aeropuerto, sin espera en la salida."
