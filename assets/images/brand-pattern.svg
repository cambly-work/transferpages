<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="routes" width="200" height="200" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3 5" opacity="0.18">
        <path d="M 0 160 Q 60 110 120 130 T 200 50"/>
        <path d="M 20 200 Q 100 180 160 130 T 200 100"/>
        <path d="M 40 80 Q 110 60 170 90 T 200 180"/>
      </g>
      <g fill="currentColor" opacity="0.25">
        <circle cx="0" cy="160" r="1.8"/>
        <circle cx="120" cy="130" r="1.8"/>
        <circle cx="200" cy="50" r="1.8"/>
        <circle cx="60" cy="200" r="1.5"/>
        <circle cx="160" cy="100" r="1.5"/>
        <circle cx="40" cy="80" r="1.5"/>
        <circle cx="170" cy="90" r="1.5"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#routes)"/>
</svg>
